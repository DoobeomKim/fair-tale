      <stop offset="1" stop-color="#EEF3F8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(450 430) rotate(90) scale(520 420)">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
