<svg width="900" height="1200" viewBox="0 0 900 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="780" y2="1160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3FAF8"/>
